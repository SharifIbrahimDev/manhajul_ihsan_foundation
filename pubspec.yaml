name: manhajul_ihsan_foundation
description: A role-based user management and financial tracking application for Manhajul Ihsan Foundation.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase dependencies
  # firebase_core: ^4.1.0
  firebase_core: ^4.1.0
  firebase_auth: ^6.0.2
  cloud_firestore: ^6.0.1
  firebase_storage: ^13.0.6

  # State management
  provider: ^6.1.5+1

  # UI and utilities
  cupertino_icons: ^1.0.8
  flutter_spinkit: ^5.2.2
  intl: ^0.20.2
  shared_preferences: ^2.5.3

  # Form validation
  email_validator: ^3.0.0

  # Charts for financial dashboard
  # fl_chart: ^1.1.1
  fl_chart: ^0.69.0

  vector_math: ^2.1.4
  image_picker: ^1.2.1
  file_picker: ^10.3.3
  permission_handler: ^12.0.1
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.2
  timeago: ^3.7.1
  emoji_picker_flutter: ^4.3.0
  firebase_messaging: ^16.0.2
  flutter_local_notifications: ^19.4.2
  pdf: ^3.11.3
  printing: ^5.14.2
  excel: ^4.0.6
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  flutter_screenutil: ^5.9.3
  path: ^1.9.1
  workmanager: ^0.9.0+3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/

